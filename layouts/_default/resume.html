{{ define "title" }}Resume — {{ .Site.Title }}{{ end }}

{{ define "head" }}
<style>
  #content { display: flex; flex-direction: column; height: calc(100vh - 60px); }
  .resume-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 8px 20px;
    background: var(--background-color, #191919);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .resume-toolbar a {
    font-size: 0.85rem;
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    color: inherit;
    text-decoration: none;
    transition: background 0.2s;
  }
  .resume-toolbar a:hover { background: rgba(255,255,255,0.1); }
  .resume-frame {
    flex: 1;
    border: none;
    width: 100%;
    display: block;
  }
</style>
{{ end }}

{{ define "main" }}
<div class="resume-toolbar">
  <a href="/Amir_Rafe_CV.pdf" download>&#8681; Download PDF</a>
</div>
<iframe class="resume-frame" src="/Amir_Rafe_CV.pdf" title="Amir Rafe Resume"></iframe>
{{ end }}
